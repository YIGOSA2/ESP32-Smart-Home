name: smart_home_app
description: ESP32智能家居控制APP 
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # MQTT通信
  mqtt_client: ^10.2.0

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  shared_preferences: ^2.2.2

  # 本地通知
  flutter_local_notifications: ^17.0.0

  # 图表库
  fl_chart: ^0.66.0

  # 时间处理
  intl: ^0.19.0

  # JSON序列化
  json_annotation: ^4.8.1

  # UI组件
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # 字体配置(可选)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
